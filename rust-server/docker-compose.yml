services:
  rust-server:
    image: ghcr.io/usa-reddragon/rust-dedicated-server:release
    container_name: rust-server
    restart: unless-stopped
    ports:
      - "28015:28015/udp"
      - "28015:28015/tcp"
      - "28016:28016/tcp"
      - "28082:28082/tcp"
    environment:
      - RUST_SERVER_NAME=My Rust Server
      - RUST_SERVER_DESCRIPTION=A Rust Server
      - RUST_RCON_PASSWORD=changeme
      - RUST_SERVER_MAXPLAYERS=50
      - RUST_SERVER_WORLDSIZE=3500
      - RUST_SERVER_SEED=12345
      - RUST_SERVER_SAVE_INTERVAL=600
      - RUST_SERVER_STARTUP_ARGUMENTS=-batchmode -load +server.secure 1 +spawn.min_rate 5 +spawn.max_rate 5 +spawn.min_density 5 +spawn.max_density 5 +env.daylength 45 +env.nightlength 5
    volumes:
      - rust-data:/data
    mem_limit: 16g

volumes:
  rust-data:
