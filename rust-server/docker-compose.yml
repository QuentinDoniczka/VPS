services:
  rust-server:
    image: pfeiffermax/rust-game-server:latest-oxide
    container_name: rust-server
    restart: unless-stopped
    ports:
      - "28015:28015/udp"
      - "28015:28015/tcp"
      - "28016:28016/tcp"
      - "28082:28082/tcp"
    command: >
      +server.ip 0.0.0.0
      +server.port 28015
      +server.hostname "My Rust Server"
      +server.description "A Rust Server"
      +server.worldsize 3500
      +server.seed 12345
      +server.maxplayers 50
      +server.saveinterval 600
      +server.secure 1
      +server.password 1974
      +server.identity server
      +rcon.ip 0.0.0.0
      +rcon.port 28016
      +rcon.password changeme
      +rcon.web 1
      +app.port 28082
      +spawn.min_rate 5
      +spawn.max_rate 5
      +spawn.min_density 2
      +spawn.max_density 2
      +env.daylength 45
      +env.nightlength 5
    volumes:
      - rust-data:/srv/rust
    mem_limit: 16g

volumes:
  rust-data:
